<svg xmlns="http://www.w3.org/2000/svg" width="520" height="520" viewBox="0 0 520 520" role="img" aria-labelledby="dvl-title dvl-desc">
  <title id="dvl-title">data viz</title>
  <desc id="dvl-desc">data viz logo: an eye-shaped mark enclosing a bar chart with a rising arrow and a sunburst, above the wordmark "data viz" and the tagline "Visualizing the Truth, Python Powered".</desc>

  <defs>
    <clipPath id="dvl-eye-clip">
      <path d="M60 200 C 150 80, 370 80, 460 200 C 370 320, 150 320, 60 200 Z"/>
    </clipPath>
  </defs>

  <rect x="8" y="8" width="504" height="504" rx="40" fill="#ffffff"/>

  <g fill="#ffffff">
    <path d="M40 200 C 140 60, 380 60, 480 200 C 380 340, 140 340, 40 200 Z"
          fill="#1b3a5b"/>
    <path d="M60 200 C 150 80, 370 80, 460 200 C 370 320, 150 320, 60 200 Z"
          fill="#ffffff"/>

    <g clip-path="url(#dvl-eye-clip)">
      <g stroke="#1b3a5b" stroke-width="9" stroke-linecap="round" fill="none">
        <line x1="260" y1="232" x2="260" y2="118"/>
        <line x1="260" y1="232" x2="178" y2="150"/>
        <line x1="260" y1="232" x2="210" y2="124"/>
        <line x1="260" y1="232" x2="310" y2="124"/>
        <line x1="260" y1="232" x2="342" y2="150"/>
      </g>

      <g fill="#1b3a5b">
        <rect x="178" y="208" width="28" height="60" rx="3"/>
        <rect x="214" y="188" width="28" height="80" rx="3"/>
        <rect x="250" y="218" width="28" height="50" rx="3"/>
        <rect x="286" y="170" width="28" height="98" rx="3"/>
        <rect x="322" y="146" width="28" height="122" rx="3"/>
      </g>

      <g fill="none" stroke="#2eb886" stroke-width="11" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="186,250 224,224 262,236 300,200 338,170"/>
      </g>
      <polygon points="338,170 318,164 330,150 348,156" fill="#2eb886"/>
      <polygon points="346,158 360,150 360,178" fill="#2eb886"/>
    </g>

    <path d="M60 200 C 150 80, 370 80, 460 200 C 370 320, 150 320, 60 200 Z"
          fill="none" stroke="#1b3a5b" stroke-width="10"/>
  </g>

  <g font-family="'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif"
     text-anchor="middle">
    <text x="260" y="420" font-size="92" font-weight="800" fill="#1b3a5b" letter-spacing="-1">
      data viz
    </text>
    <text x="260" y="470" font-size="22" font-weight="600" fill="#1b3a5b" letter-spacing="0.5">
      Visualizing the Truth, Python Powered
    </text>
  </g>
</svg>
